 name: CI Java Radar                                                           

  on:
    push:
      branches: [ "main" ]
    pull_request:

  jobs:
    build:
      name: Build
      runs-on: ubuntu-latest
      steps:
        - name: Baixar código
          uses: actions/checkout@v3

        - name: Configurar Java 17
          uses: actions/setup-java@v3
          with:
            distribution: 'temurin'
            java-version: '17'

        - name: Compilar projeto
          run: mvn clean compile

        - name: Salvar artefatos de build
          uses: actions/upload-artifact@v4
          with:
            name: build-target
            path: target/

    test:
      name: Test
      runs-on: ubuntu-latest
      needs: build
      continue-on-error: true
      steps:
        - name: Baixar código
          uses: actions/checkout@v3

        - name: Configurar Java 17
          uses: actions/setup-java@v3
          with:
            distribution: 'temurin'
            java-version: '17'

        - name: Executar testes
          run: mvn test

        - name: Gerar relatório JUnit
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: relatorio-testes
            path: target/surefire-reports/

    deploy:
      name: Deploy
      runs-on: ubuntu-latest
      needs: test
      if: always() && github.ref == 'refs/heads/main'
      steps:
        - name: Deploy simulado
          run: echo "Deploy realizado com sucesso na branch main!"